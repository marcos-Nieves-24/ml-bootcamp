site_name: "ML Bootcamp — Machine Learning para Análisis de Datos y SaaS"
site_description: "Curso universitario de introducción al Machine Learning para estudiantes de Biotecnología, Bioinformática y Análisis de Datos"
site_url: "https://ml-bootcamp.vercel.app"
repo_url: "https://github.com/marcos-Nieves-24/ml-bootcamp"
repo_name: "marcos-Nieves-24/ml-bootcamp"
edit_uri: "edit/main/docs/"

theme:
  name: material
  language: es
  favicon: assets/favicon.png
  icon:
    logo: fontawesome/solid/laptop-code
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Modo oscuro
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: false
      allow_errors: false
      # ignore_h1_title: true
  # - minify:  # requires mkdocs-minify-plugin

markdown_extensions:
  - admonition
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/marcos-Nieves-24/ml-bootcamp
  consent:
    title: Aviso de cookies
    description: Este sitio usa cookies para analytics.

copyright: >
  &copy; 2026 marcos-Nieves-24 &mdash; MIT License

extra_css:
  - assets/extra.css

