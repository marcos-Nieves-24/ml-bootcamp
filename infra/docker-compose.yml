version: '3.8'

services:
  platform:
    build:
      context: ../platform
      dockerfile: ../infra/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reload
      - ../platform:/app
      # Mount node_modules to avoid re-installing
      - platform_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  platform_node_modules:
  redis_data: