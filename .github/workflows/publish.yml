name: Publish Documentation

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mkdocs mkdocs-material

      - name: Build documentation with MkDocs
        run: |
          if [ -f mkdocs.yml ]; then
            mkdocs build --strict
          else
            echo "No mkdocs.yml found. Creating placeholder documentation."
            mkdir -p site
            cat > site/index.html << 'EOF'
            <!DOCTYPE html>
            <html>
            <head><title>ML Bootcamp</title></head>
            <body>
              <h1>Machine Learning for Data Analysis and SaaS</h1>
              <p>Course documentation site. Content coming soon.</p>
              <ul>
                <li><a href="content/module01_ai/">Module 1: Introduction to AI</a></li>
                <li><a href="content/module02_python/">Module 2: Python Programming Fundamentals</a></li>
                <li><a href="content/module03_statistics/">Module 3: Statistics for Machine Learning</a></li>
                <li><a href="content/module04_machine_learning/">Module 4: Introduction to Machine Learning</a></li>
                <li><a href="content/module05_ethics/">Module 5: Ethics in Artificial Intelligence</a></li>
              </ul>
            </body>
            </html>
            EOF
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
